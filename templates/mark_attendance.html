<!DOCTYPE html>
<html>
<head>
    <title>Mark Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="layout">

    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-fingerprint"></i>
            <div>
                <h4>Smart Attendance</h4>
                <p>System</p>
            </div>
        </div>

        <a class="nav-link" href="/">
            <i class="bi bi-grid"></i> Dashboard
        </a>

        <a class="nav-link" href="/employees">
            <i class="bi bi-people"></i> Employees
        </a>

        <a class="nav-link active" href="/attendance">
            <i class="bi bi-calendar-check"></i> Attendance
        </a>
    </aside>

    <main class="main">

        <div class="form-card">

            <h3>Mark Attendance</h3>
            <p class="text-muted">
                Manual attendance entry for testing before biometric integration.
            </p>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Select Employee</label>

                    <select name="employee_id" class="form-control" required>
                        <option value="">-- Select Employee --</option>

                        {% for emp in employees %}
                        <option value="{{ emp.id }}">
                            {{ emp.employee_code }} - {{ emp.name }} - {{ emp.department }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>

                    <select name="status" class="form-control" required>
                        <option value="Present">Present</option>
                        <option value="Late">Late</option>
                        <option value="Absent">Absent</option>
                    </select>
                </div>

                <button class="btn btn-primary w-100">
                    <i class="bi bi-check-circle"></i> Mark Attendance
                </button>

                <a href="/attendance" class="btn btn-secondary w-100 mt-3">
                    Back
                </a>

            </form>

        </div>

    </main>

</div>
</body>
</html>
